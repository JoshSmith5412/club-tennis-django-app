<!DOCTYPE html>
<html>
<head>
    <title>Add Player</title>
</head>
<body>

    <h1>Add New Player</h1>

    <a href="/players/">← Back to Players</a>

    <form method="POST">
        {% csrf_token %}

        <p>
            Name:<br>
            <input type="text" name="name">
        </p>

        <p>
            Email:<br>
            <input type="email" name="email">
        </p>

        <p>
            Skill Level:<br>
            <input type="text" name="skill_level">
        </p>

        <button type="submit">Add Player</button>
    </form>

</body>
</html>
